<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep indigo to violet -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>

    <!-- Subtle inner glow overlay -->
    <radialGradient id="bgGlow" cx="40%" cy="30%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Track ring gradient -->
    <linearGradient id="trackGrad" x1="200" y1="200" x2="824" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Progress arc gradient: bright cyan-blue to violet -->
    <linearGradient id="arcGrad" x1="180" y1="180" x2="844" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="40%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Hand gradient -->
    <linearGradient id="handGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>

    <!-- Center dot gradient -->
    <radialGradient id="centerGrad" cx="35%" cy="30%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </radialGradient>

    <!-- Arc tip glow -->
    <radialGradient id="tipGlow" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter for hands -->
    <filter id="handShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Soft glow filter for arc -->
    <filter id="arcGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Background shadow -->
    <filter id="bgShadow">
      <feDropShadow dx="0" dy="20" stdDeviation="40" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Clip to rounded rect -->
    <clipPath id="roundClip">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>
  <!-- Inner glow overlay -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGlow)"/>

  <!-- Subtle grid texture lines for depth -->
  <g opacity="0.04" clip-path="url(#roundClip)">
    <line x1="0" y1="256" x2="1024" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="512" x2="1024" y2="512" stroke="white" stroke-width="1"/>
    <line x1="0" y1="768" x2="1024" y2="768" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="white" stroke-width="1"/>
    <line x1="768" y1="0" x2="768" y2="1024" stroke="white" stroke-width="1"/>
  </g>

  <!-- Clock face: subtle frosted glass disc -->
  <circle cx="512" cy="512" r="340" fill="#ffffff" fill-opacity="0.04"/>
  <circle cx="512" cy="512" r="340" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" fill="none"/>

  <!-- Track ring (outer, dimmed) -->
  <circle cx="512" cy="512" r="308" stroke="url(#trackGrad)" stroke-width="48" fill="none"/>

  <!-- Progress arc: from ~-130° to ~+140° (about 270° sweep)
       Start point at angle -130° from 3 o'clock = 220° CCW = ~(-130° in standard)
       Using: startX = 512 + 308*cos(220°) = 512 + 308*(-0.766) = 512 - 236 = 276
               startY = 512 + 308*sin(220°) = 512 + 308*(-0.643) = 512 - 198 = 314
       End point at angle +140° from 3 o'clock = 140°
               endX = 512 + 308*cos(140°) = 512 + 308*(-0.766) = 512 - 236 = 276
               endY = 512 + 308*sin(140°) = 512 + 308*(0.643) = 512 + 198 = 710
       Large arc = 1, sweep = 1 (clockwise), going 270° -->
  <path
    d="M 276 314 A 308 308 0 1 1 276 710"
    stroke="url(#arcGrad)"
    stroke-width="48"
    stroke-linecap="round"
    fill="none"
    filter="url(#arcGlow)"
  />

  <!-- Tick marks (12 positions, subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.2" stroke-width="3" stroke-linecap="round">
    <!-- 12 o'clock -->
    <line x1="512" y1="186" x2="512" y2="216"/>
    <!-- 1 -->
    <line x1="666" y1="204" x2="651" y2="230"/>
    <!-- 2 -->
    <line x1="795" y1="307" x2="773" y2="320"/>
    <!-- 3 -->
    <line x1="838" y1="512" x2="808" y2="512"/>
    <!-- 4 -->
    <line x1="795" y1="717" x2="773" y2="704"/>
    <!-- 5 -->
    <line x1="666" y1="820" x2="651" y2="794"/>
    <!-- 6 -->
    <line x1="512" y1="838" x2="512" y2="808"/>
    <!-- 7 -->
    <line x1="358" y1="820" x2="373" y2="794"/>
    <!-- 8 -->
    <line x1="229" y1="717" x2="251" y2="704"/>
    <!-- 9 -->
    <line x1="186" y1="512" x2="216" y2="512"/>
    <!-- 10 -->
    <line x1="229" y1="307" x2="251" y2="320"/>
    <!-- 11 -->
    <line x1="358" y1="204" x2="373" y2="230"/>
  </g>

  <!-- Hour hand (~10 o'clock = 300°, length ~180px) -->
  <!-- 10 o'clock angle = 300° from 12 = -60° from 3 o'clock
       tip: 512 + 185*cos(300°-90°) ... let's use clock coords:
       10 o'clock = 300° clockwise from 12 = -60° from vertical
       tipX = 512 + 185*sin(300°) = 512 + 185*(-0.866) = 512 - 160 = 352
       tipY = 512 - 185*cos(300°) = 512 - 185*(0.5) = 512 - 92.5 = 419 -->
  <line x1="512" y1="512" x2="354" y2="421"
    stroke="url(#handGrad)" stroke-width="36" stroke-linecap="round"
    filter="url(#handShadow)"/>

  <!-- Minute hand (~2 o'clock = 60°, length ~240px) -->
  <!-- 2 o'clock = 60° clockwise from 12
       tipX = 512 + 240*sin(60°) = 512 + 240*0.866 = 512 + 208 = 720
       tipY = 512 - 240*cos(60°) = 512 - 240*0.5 = 512 - 120 = 392 -->
  <line x1="512" y1="512" x2="680" y2="400"
    stroke="url(#handGrad)" stroke-width="26" stroke-linecap="round"
    filter="url(#handShadow)"/>

  <!-- Center hub: layered circles for depth -->
  <circle cx="512" cy="512" r="52" fill="#1e1b4b" fill-opacity="0.8"/>
  <circle cx="512" cy="512" r="38" fill="url(#centerGrad)"/>
  <circle cx="512" cy="512" r="16" fill="#ffffff" fill-opacity="0.9"/>

  <!-- Arc end cap glow (bright dot at arc tip) -->
  <!-- Arc ends at (276, 710) -->
  <circle cx="276" cy="710" r="40" fill="url(#tipGlow)" opacity="0.6"/>
  <circle cx="276" cy="710" r="24" fill="#7dd3fc"/>
  <circle cx="276" cy="710" r="14" fill="#ffffff"/>

  <!-- Top highlight shimmer (macOS gloss effect) -->
  <ellipse cx="512" cy="280" rx="280" ry="120"
    fill="url(#bgGlow)" opacity="0.15"/>
</svg>
